name: Update README Stats

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日 UTC 00:00（JST 09:00）に実行
  workflow_dispatch:      # 手動実行も可能

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify README badges are reachable (shields.io)
        run: |
          echo "Verifying shields.io badge URLs..."
          curl -f -s -o /dev/null \
            "https://img.shields.io/badge/Portfolio-kageyama--portfolio.jp-0ea5e9?style=for-the-badge&logo=vercel&logoColor=white" \
            && echo "shields.io: OK" || echo "shields.io: unreachable (non-fatal)"

      - name: Verify github-readme-stats
        run: |
          echo "Verifying github-readme-stats..."
          curl -f -s -o /dev/null \
            "https://github-readme-stats.vercel.app/api?username=12kagetti12&show_icons=true" \
            && echo "github-readme-stats: OK" || echo "github-readme-stats: unreachable (non-fatal)"

      - name: Commit README if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && echo "No changes to commit" || \
            (git add README.md && git commit -m "chore: auto-update README stats [skip ci]" && git push)
