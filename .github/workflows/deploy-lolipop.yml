name: Deploy to Lolipop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy to Lolipop via rsync
        env:
          SSHPASS: ${{ secrets.LOLIPOP_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p 2222 -o StrictHostKeyChecking=no" \
            out/ \
            ${{ secrets.LOLIPOP_USER }}@${{ secrets.LOLIPOP_HOST }}:${{ secrets.LOLIPOP_DEPLOY_PATH }}
